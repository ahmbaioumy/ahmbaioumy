name: Nightly Tier 2

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: WFM-Planning-Suite

jobs:
  tier2-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Full Tier 2 suite
        run: pytest tests/ -m tier2 -v --tb=short --timeout=300

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'WFM-Planning-Suite/**'
  pull_request:
    paths:
      - 'WFM-Planning-Suite/**'

defaults:
  run:
    working-directory: WFM-Planning-Suite

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src tests

      - name: Offline enforcement scan
        run: python scripts/check_offline.py

      - name: Core isolation scan
        run: python scripts/check_core_isolation.py

      - name: Tier 1 tests
        run: pytest tests/ -m tier1 -v --tb=short

      - name: Tier 2 tests
        run: pytest tests/ -m tier2 -v --tb=short

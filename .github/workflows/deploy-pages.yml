name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'WFM-Planning-Suite/web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: WFM-Planning-Suite/web/package-lock.json

      - name: Build web app
        working-directory: WFM-Planning-Suite/web
        run: |
          npm ci
          npm run build

      - name: Copy build to site root (legacy GitHub Pages)
        run: |
          cp WFM-Planning-Suite/web/dist/index.html .
          cp -r WFM-Planning-Suite/web/dist/assets .
          cp WFM-Planning-Suite/web/dist/favicon.svg .
          cp WFM-Planning-Suite/web/dist/sample_data.csv .
          touch .nojekyll

      - name: Commit and push static site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ favicon.svg sample_data.csv .nojekyll
          if git diff --staged --quiet; then
            echo "No site changes to deploy"
            exit 0
          fi
          git commit -m "Deploy WFM web app to GitHub Pages [skip ci]"
          git push

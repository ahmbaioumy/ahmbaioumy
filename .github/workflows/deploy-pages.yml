name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'WFM-Planning-Suite/web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: WFM-Planning-Suite/web/package-lock.json

      - name: Build web app
        working-directory: WFM-Planning-Suite/web
        run: |
          npm ci
          npm run build

      - name: Copy build to wfm-app folder
        run: |
          rm -rf wfm-app
          mkdir -p wfm-app
          cp -r WFM-Planning-Suite/web/dist/* wfm-app/
          touch .nojekyll

      - name: Commit and push static site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wfm-app/ .nojekyll
          git rm -rf --ignore-unmatch index.html assets favicon.svg sample_data.csv 2>/dev/null || true
          git add -u
          if git diff --staged --quiet; then
            echo "No site changes to deploy"
            exit 0
          fi
          git commit -m "Deploy WFM web app to wfm-app/ [skip ci]"
          git push
